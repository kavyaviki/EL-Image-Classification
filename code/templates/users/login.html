{% extends 'base_dashboard.html' %}
{% load crispy_forms_tags %}

{% block title %}Login{% endblock %}

{% block public_content %}
<div class="row justify-content-center min-vh-100 align-items-center">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <i class="fas fa-solar-panel fa-4x text-primary"></i>
            <h2 class="mt-3">EL Classification</h2>
            <p class="text-muted">Quality Inspection System</p>
        </div>
        
        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="fas fa-sign-in-alt me-2 text-primary"></i>Login to Dashboard</h5>
            </div>
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
                <hr>
                <!-- <p class="text-center mb-0">
                    Don't have an account? 
                    <a href="{% url 'users:register' %}" class="text-primary">Register here</a>
                </p> -->
            </div>
        </div>
    </div>
</div>
{% endblock %}
